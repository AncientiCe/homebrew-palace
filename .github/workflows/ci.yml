name: Tap CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  audit:
    name: Audit formula (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: Homebrew/actions/setup-homebrew@master

      # Register the checkout as a tap via symlink so `brew` can address the
      # formula by name (path-based `brew audit/install` is disabled). A symlink
      # (not a copy) keeps setup-homebrew's post-cleanup happy.
      - name: Link tap into Homebrew
        run: |
          tap_dir="$(brew --repository)/Library/Taps/ancientice/homebrew-palace"
          rm -rf "$tap_dir"
          mkdir -p "$(dirname "$tap_dir")"
          ln -s "$GITHUB_WORKSPACE" "$tap_dir"

      - name: brew style
        run: brew style ancientice/palace

      - name: brew audit
        run: brew audit --online --formula ancientice/palace/palace

      - name: Install and test formula
        run: |
          brew install ancientice/palace/palace
          brew test ancientice/palace/palace
